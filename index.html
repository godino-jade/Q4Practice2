<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice2</title>
</head>
<body>
    <h1>Switch Statement</h1>

    <script>
        let team = "Green"; // string

        switch(team){
            case "Green":
                alert("Go Green Hornets!");
                break;

            case "Blue":
                alert("Go Blue Bear!");
                break;

            case "Red":
                alert("Go Red Bulldogs!");
                break;

            case "Yellow":
                alert("Go Yellow Tigers!");
                break;
            
            default:
                alert("No team found.");
        }
    </script>
</body>
</html>
